<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Q4 1st Graded Exercise">
    <meta name="keywords" content="Movie Form">
    <meta name="author" content="Sam Pre">

   <style>
            body{
                font-family: Arial, sans-serif;
                background-color: #f0f0f0;
                margin: 0;
                padding: 20px;
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            a {
                align-self: flex-start;
                margin-bottom: 20px;
                color: #5C6AC4;
                text-decoration: none;
                font-weight: bold;
            }
            a:hover { text-decoration: underline; }
            .title {
                color: #5C6AC4;
                margin: 0;
                padding: 25px;
            }
            fieldset {
                width: 100%;
                max-width: 500px;
                margin: 0 auto 20px auto;
                padding: 25px;
                box-shadow: 0 2px 6px rgba(0,0,0,0.1);
                background: #fff;
                border-radius: 8px;
            }
            input, select, button {
                width: 100%;
                padding: 8px;
                margin-top: 4px;
                box-sizing: border-box;
                font-size: 1rem;
            }
            button {
                cursor: pointer;
                background:#5C6AC4;
                color:#fff;
                border:none;
                border-radius:4px;
                margin-top:10px;
            }
            /* some spacing for the movie list */
            #savedMovies {
                display: inline-block;
                text-align: left;
                margin-top: 10px;
                width: 100%;
            }
            ul { list-style: none; padding: 0; margin: 0; }
            li { padding: 4px 0; border-bottom: 1px solid #ddd; display: flex; align-items: center; justify-content: space-between; }
            button.delete-btn { background: #e74c3c; color: #fff; border: none; border-radius: 50%; padding: 0; cursor: pointer; font-size: 1rem; line-height: 1; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; }
            button.delete-btn:hover { background: #c0392b; }
            .rate { display: flex; flex-direction: row-reverse; justify-content: center; margin: 0 auto; }
            .rate input { display: none; }
            .rate label { font-size: 2rem; color: #ccc; cursor: pointer; }
            .rate label:hover, .rate label:hover ~ label, .rate input:checked ~ label { color: gold; }

            /* stars shown in the saved movie list */
            .saved-stars { font-size: 2rem; color: gold; margin-left: 0.25rem; }

            @media (max-width: 600px) {
                fieldset { width: 90%; }
            }
    </style>
  </head>
  <body>
     <header>
        <div>
            
            <h3>by Sam Pre </h3>
        </div>
    </header>
    <section>
      <h1 class="title">Movie Form</h1>
        <form id = form>
        <fieldset>
          <label> Movie Name:
            <input type="text" name="title" id="title" required />
          </label><br/><br/>

            <label> Year: 
            <input type="number" name="year" id="year" required />
          </label><br/><br/>
          
              <label for="Genre">Genre:</label>
            <select name="genre" id="genre">
                <option value="Action">Action</option>
                <option value="Comedy">Comedy</option>
                <option value="Romance">Romance</option>
                <option value="Horror">Horror</option>
            </select>
            <br/><br/>

            <label> Rating: 
            <div class="rate"></label><br/><br/>
          <input type="radio" id="star5" name="rating" value="5" /><label for="star5" title="5 stars">★</label>
          <input type="radio" id="star4" name="rating" value="4" /><label for="star4" title="4 stars">★</label>
          <input type="radio" id="star3" name="rating" value="3" /><label for="star3" title="3 stars">★</label>
          <input type="radio" id="star2" name="rating" value="2" /><label for="star2" title="2 stars">★</label>
          <input type="radio" id="star1" name="rating" value="1" /><label for="star1" title="1 stars">★</label>
          
          </div> <br>

          <button type="submit" value = "Add Movie">Add Movie</button><br>


        <label><br>Movie List:<br></label>
        <span id="savedMovies"></span>

        </fieldset>
      </form>


      <script>
        
        const form = document.getElementById('form');

        function getMovies() {
          const getstuff = localStorage.getItem('movies');
          return getstuff ? JSON.parse(getstuff) : [];
        }
         function saveMovies(movies) {
          localStorage.setItem('movies', JSON.stringify(movies));
        }

        form.addEventListener('submit', function(event) {
          event.preventDefault();
          const formData = new FormData(form);
          const movie = Object.fromEntries(formData.entries());

          
          if (movie.rating) movie.rating = Number(movie.rating);

          const movies = getMovies();
          movies.push(movie);
          saveMovies(movies);

          form.reset();
          displayMovies();
        });

        function displayMovies() {
          const container = document.getElementById('savedMovies');
          container.textContent = '';

          const movies = getMovies();
          if (movies.length === 0) {
            container.textContent = 'No movies added yet.';
            return;
          }

          const ul = document.createElement('ul');
          movies.forEach((m, index) => {
            const li = document.createElement('li');

            let text = `${m.title} (${m.year}) - ${m.genre}`;
            li.textContent = text;
            if (m.rating) {
              const starSpan = document.createElement('span');
              starSpan.className = 'saved-stars';

              starSpan.textContent = ' ' + '★'.repeat(m.rating);
              li.appendChild(starSpan);
            }

            const del = document.createElement('button');
            del.textContent = '×';
            del.title = 'Delete';
            del.className = 'delete-btn';
            del.addEventListener('click', () => {
              if (confirm(`Are you sure you want to delete "${m.title}"?`)) {
                const movies = getMovies();
                movies.splice(index, 1);
                saveMovies(movies);
                displayMovies();
              }
            });
            li.appendChild(del);
            ul.appendChild(li);
          });
          container.appendChild(ul);
        }

        // Call the function on page load to display any existing movies
        window.onload = displayMovies;
      </script>
  </body>
</html>
