<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Q3 2nd Graded Exercise">
    <meta name="keywords" content="HTML Forms">
    <meta name="author" content="Sam Pre">
    <title>Sample Form</title>
    <!-- updated external css link to show how to share it between repository -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="./styles.css" />
    <script src="script.js" defer></script>
   <style>
    body{
        padding: 25px;
        font-family: arial;
        width: 80%;
        margin-left: 10%;
        }

        .title {
            color: #5C6AC4;
        }

        fieldset:nth-child(2) {
             margin-top: 20px;
        }

        legend {
            background: black;
            color: yellow;
            padding: 5px;
        }
        label {
             margin: 5%;
        }
    </style>
  </head>
  <body>
     <header>
        <div>
            
            <h3>by Sam Pre </h3>
        </div>
    </header>
    <section>
      <h1 class="title">Movie Form</h1>
      <form id="dForm" action="registered.html" method="get">
        
        <fieldset>
          <label> Movie Name:
            <input type="text" name="Mname" id="Mname" required />
          </label><br/><br/>
            <label> Year: 
            <input type="number" name="year" id="year" required />
          </label><br/><br/>
          
              <label for="Genre">Genre:</label>
            <select name="Genre" id="Genre">
                <option value="Action">Action</option>
                <option value="Comedy">Comedy</option>
                <option value="Romance">Romance</option>
                <option value="Horror">Horror</option>
            </select>
            <br/><br/>
            <div class="Rating">
            <div class="rating">
            <label> Rating: 
            <input type="radio" name="1st star" value="1" />
            <label for="1st star" class="fa fa-star"></label>
            <input type="radio" name="2nd star" value="2" />
            <label for="2st star" class="fa fa-star"></label>
            <input type="radio" name="3rd star" value="3" />
            <label for="3rd star" class="fa fa-star"></label>
            <input type="radio" name="4th star" value="4" />
            <label for="4th star" class="fa fa-star"></label>
            <input type="radio" name="5th star" value="5" />
            <label for="5th star" class="fa fa-star"></label> 
          </label><br/><br/>
          </div>
          </div>
        </fieldset>
